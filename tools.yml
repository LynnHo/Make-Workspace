name: tools
channels:
  - conda-forge

dependencies:
  # Language
  - python>=3.10
  - pip
  - pipx
  - uv
  - nodejs
  - rust
  - cmake

  # Terminal
  - zsh
  - tmux

  # Editor
  - vim

  # Repo
  - git
  - git-lfs
  - git-delta
  - gh
  - huggingface_hub

  # File
  - fd-find
  - ripgrep
  - eza # - exa
  - bat
  - jq
  - fx
  - viu
  - bioconda::rename
  - trash-cli

  # Archive
  - p7zip
  - libunrar

  # Monitoring
  - htop
  - bpytop
  - nvitop # - gpustat
  - duf
  - dust

  # Network
  - curl
  - curl-cffi
  - aria2
  - rsync
  - lftp
  - sshpass
  - inetutils
  - speedtest-cli

  # Media
  - yt-dlp
  - ffmpeg
  - imagemagick

  # Document
  - pandas
  - pandoc
  - python-docx
  - python-pptx
  - openpyxl
  - pymupdf
  - ebooklib
  - nbconvert
  - cairosvg
  - pip:
      - "markitdown[all]"

  # Web
  - flask

  # Helper
  - tldr
  - pv
  - parallel
  - rvalieris::xfennec-progress
